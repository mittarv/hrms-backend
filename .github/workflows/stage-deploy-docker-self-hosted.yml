name: Build, Deploy to Docker and Create Release Self hosted

on:
  push:
    branches:
      - staging
  workflow_dispatch:

env:
  DOCKER_IMAGE_NAME: hrms-backend
  DOCKER_CONTAINER_NAME: hrms-backend

jobs:
  build-and-deploy:
    name: Build and Deploy using Docker
    environment: hrms-backend
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Generate release tag
        id: tag
        shell: pwsh
        run: |
          $RELEASE_DATE = Get-Date -Format "yyyy-MM-dd"
          $SHORT_SHA = git rev-parse --short HEAD
          $RELEASE_TAG = "release-$RELEASE_DATE-$SHORT_SHA"

          Write-Host "Release tag: $RELEASE_TAG"

          "release_tag=$RELEASE_TAG" >> $env:GITHUB_OUTPUT
          "RELEASE_TAG=$RELEASE_TAG" >> $env:GITHUB_ENV

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a $RELEASE_TAG -m "Release $RELEASE_TAG"
          git push origin $RELEASE_TAG

